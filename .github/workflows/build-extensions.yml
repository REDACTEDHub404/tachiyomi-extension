name: Build Extensions

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Bully Manga
      run: |
        chmod +x gradlew
        ./gradlew :src:th:bullymanga:assembleRelease

    - name: Build Nano Manga
      run: ./gradlew :src:th:nanomanga:assembleRelease

    - name: Build Ped Manga
      run: ./gradlew :src:th:pedmanga:assembleRelease

    - name: Build Manga LC
      run: ./gradlew :src:th:mangalc:assembleRelease

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: extensions-apk
        path: |
          src/th/bullymanga/build/outputs/apk/release/*.apk
          src/th/nanomanga/build/outputs/apk/release/*.apk
          src/th/pedmanga/build/outputs/apk/release/*.apk
          src/th/mangalc/build/outputs/apk/release/*.apk
